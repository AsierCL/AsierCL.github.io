<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio – Asier Cabo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
  	darkMode: 'class'
  }
  </script> 
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <header class="text-center py-10">
    <h1 class="text-4xl font-bold">Portfolio de Asier Cabo</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400">Explora mis proyectos por categoría</p>
  </header>

  <main class="max-w-7xl mx-auto px-4" x-data="{ category: 'Todos' }">
    <!-- Filtro de categorías -->
    <div class="flex flex-wrap justify-center gap-3 mb-8">
      <button @click="category = 'Todos'" :class="category === 'Todos' ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white'" class="px-4 py-2 rounded-full text-sm font-semibold transition hover:scale-105">Todos</button>
      <template x-for="cat in ['Linux', 'Web', 'Ciberseguridad', 'Juegos']">
        <button @click="category = cat" :class="category === cat ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white'" class="px-4 py-2 rounded-full text-sm font-semibold transition hover:scale-105" x-text="cat"></button>
      </template>
    </div>

    <!-- Grid de proyectos -->
    <div class="grid md:grid-cols-3 gap-6">
      <!-- Proyecto -->
      <template x-for="project in [
        { 
			title: 'GreenDots Application', 
			category: 'Programming', 
			image: '/images/GreenDots.png', 
			description: 'Aplicación Android para localización de puntos verdes', 
			url: 'https://github.com/martindios/GreenDots' 
		},
		{ 
			title: 'Logisim Computer', 
			category: 'Others', 
			image: '/images/LogisimComputer.png', 
			description: 'Simulador de computadora en Logisim', 
			url: 'https://github.com/AsierCL/Logisim-PC' 
		},
		{ 
			title: 'My Dotfiles', 
			category: 'Others', 
			image: '/images/MyDotfiles.png', 
			description: 'Configuración personal de entorno Linux', 
			url: 'https://github.com/AsierCL/Dotfiles' 
		},
		{ 
			title: 'Encrypted Chat P2P', 
			category: 'Programming', 
			image: '/images/SecureChat.png', 
			description: 'Chat encriptado punto a punto en C', 
			url: 'https://github.com/AsierCL/Secure-encrypted-chat' 
		},
		{ 
			title: 'Arch Installation Guide', 
			category: 'Others', 
			image: '/images/ArchInstallation.png', 
			description: 'Guía paso a paso para instalar Arch Linux', 
			url: 'https://github.com/AsierCL/Arch-Instalation-Guide' 
		},
		{ 
			title: 'Monopoly Java', 
			category: 'Programming', 
			image: '/images/MonopolyJava.png', 
			description: 'Implementación del juego Monopoly en Java', 
			url: 'https://github.com/AsierCL/Monopoly' 
		},
		{ 
			title: 'Printer Management Application', 
			category: 'Programming', 
			image: '/images/PrinterManagementApplication.png', 
			description: 'Gestión de impresoras en C', 
			url: 'https://github.com/AsierCL/Printer-Management-Application' 
		},
		{ 
			title: 'Vector Sorting Application', 
			category: 'Programming', 
			image: '/images/VectorSorting.png', 
			description: 'Programa para ordenar vectores en C', 
			url: 'https://github.com/AsierCL/Vector-Sorting-Program' 
		},
		{ 
			title: 'Introduction to Ciberseguridad', 
			category: 'Ciberseguridad', 
			image: '/images/CiscoIntroCybersec.png', 
			description: 'Curso introductorio a la ciberseguridad', 
			url: '/images/Certificado Cisco Ciberseguridad.pdf' 
		},
		{ 
			title: 'Linux Fundamentals', 
			category: 'Ciberseguridad', 
			image: '/images/LinuxFundamentalsHTB.png', 
			description: 'Fundamentos de Linux para hacking', 
			url: 'https://academy.hackthebox.com/achievement/badge/a2a9f917-c408-11ed-acfc-bea50ffe6cb4' 
		},
		{ 
			title: 'Google: Artificial Intelligence and Productivity', 
			category: 'Others', 
			image: '/images/GoogleSantanderIA.png', 
			description: 'Curso sobre IA y productividad', 
			url: '/images/Google:InteligenciaArtificialyproductividad.pdf' 
		},
		{ 
			title: 'Networking Basics', 
			category: 'Others', 
			image: '/images/CiscoNetworkingBasics.png', 
			description: 'Conceptos básicos de redes', 
			url: 'https://www.credly.com/badges/fddd7eb8-ae56-4ec5-8aeb-6ea5c1cb1bb8' 
		}
      ]" :key="project.title">
        <a :href="project.url" target="_blank" x-show="category === 'Todos' || project.category === category"
           class="block bg-white dark:bg-gray-800 rounded-2xl shadow hover:shadow-lg transition overflow-hidden">
          <div class="w-full sm:w-[412px] h-[358px] mx-auto">
            <img :src="project.image" :alt="project.title" class="w-full h-full object-contain" />
          </div>
          <div class="p-5">
            <span class="text-sm text-blue-600 dark:text-blue-400 font-semibold" x-text="project.category"></span>
            <h4 class="text-xl font-bold mt-2 mb-1" x-text="project.title"></h4>
            <p class="text-gray-600 dark:text-gray-300 text-sm" x-text="project.description"></p>
          </div>
        </a>
      </template>
    </div>
  </main>

  <footer class="text-center mt-12 py-6 text-sm text-gray-500 dark:text-gray-400">
    © 2025 Asier Cabo. Todos los derechos reservados.
  </footer>
</body>
</html>
